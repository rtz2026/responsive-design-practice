<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Cat Home</title>
    <link rel="stylesheet" href="catMain.css">
</head>
<body>
    <h1>Welcome to Cat Home Page</h1>
    <script src="catFunctions.js"></script>
            <div><p>This is a simple cat home page.</p></div>
            <div><p>Here you can get as many cats as you want by clicking the button.</p></div>
            <div><p>Just enter the number of cats you want and click the button.</p></div>
            <div><p>Check the box to swap the direction of the cat loading.</p></div>
    <div>
        <p>How many cats do you want? (Maximum 10)</p>
        <input type="number" id="catNumber" name="catNumber" min="1" max="10">
        <button type="button">Give me cats!</button>
        <input type="checkbox" id="swapDirection" name="swapDirection">
        <label for="swapDirection">Swap Direction</label>
    </div>
    <div id="container">
    </div>
</body>
</html>
